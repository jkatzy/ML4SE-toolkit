name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev --extra treesitter
      - run: uv run ruff check src tests examples
      - run: uv run pytest -m "not optional_dependency"
      - run: uv run pytest -m "optional_dependency" --no-cov
      - name: Enforce main-branch policy on tagged releases
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: python scripts/check_main_branch_policy.py
      - name: Verify release version metadata
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            python scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"
          else
            python scripts/check_release_version.py
          fi
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  publish-testpypi:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ml4setk
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ml4setk
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
